<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Diary</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        #pin-lock { display: none; }
        #diary-content { display: none; }
        /* Add more styling as needed */
    </style>
</head>
<body>
    <h1>My Diary</h1>
    <div id="pin-lock">
        <h2>PIN Lock</h2>
        <input type="password" id="pin-input" placeholder="Enter PIN" />
        <button id="unlock-button">Unlock</button>
    </div>
    <div id="diary-content">
        <h2>Write and Draw</h2>
        <textarea id="write-area" rows="10" cols="30" placeholder="Write your thoughts..."></textarea>
        <canvas id="drawing-area" style="border:1px solid #000; width: 300px; height: 300px;"></canvas>
        <h2>Add Photos</h2>
        <input type="file" id="photo-upload" accept="image/*" multiple />
        <h2>Calendar</h2>
        <input type="date" id="calendar" />
        <h2>Export to PDF</h2>
        <button id="export-pdf">Export as PDF</button>
    </div>
    <script>
        const correctPin = "1234";
        document.getElementById('unlock-button').onclick = function() {
            const enteredPin = document.getElementById('pin-input').value;
            if (enteredPin === correctPin) {
                document.getElementById('pin-lock').style.display = 'none';
                document.getElementById('diary-content').style.display = 'block';
            } else {
                alert('Incorrect PIN!');
            }
        };

        // Functionality for drawing
        const canvas = document.getElementById('drawing-area');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mousemove', (event) => {
            if (!drawing) return;
            ctx.lineTo(event.clientX - canvas.offsetLeft, event.clientY - canvas.offsetTop);
            ctx.stroke();
        });

        // Functionality for PDF export
        document.getElementById('export-pdf').onclick = () => {
            // PDF export logic goes here
            alert('PDF export functionality coming soon!');
        };
    </script>
</body>
</html>
